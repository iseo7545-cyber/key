name: Build macOS App

on: [push]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: PyInstaller 설치
        run: pip install pyinstaller

      - name: 앱 만들기
        run: pyinstaller --windowed key.py

      - name: 결과 업로드
        uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: dist/
